# ``[[NamedAnchors]]`` / ``[[FunctionAnchors]]`` ``Address``: ROM **file** offset in hex (e.g. ``0x147148``), not a
# GBA bus address with the ``0x08`` prefix. Deprecated ``[[OffsetPointer]]`` sections are ignored and not written back.
#
# Struct uint fields: ``name:listname`` or ``name:listname+3`` / ``name:pcs.table-1`` ‚Äî optional trailing signed
# integer shifts the index used for [[List]] / PCS labels (ROM stores idx; label row is idx + offset).
#
# Struct fixed-width text (inside ``[‚Ä¶]`` Format):
#   ``name""N`` ‚Äî PCS-encoded string, width N bytes (0xFF terminator; same as PCS string tables).
#   ``name''N`` ‚Äî raw Latin-1 / byte string, width N bytes (NUL-padded; read/display up to first 0x00).
#   ``fieldname<''>`` ‚Äî **4-byte GBA pointer** to Latin-1 text terminated by ``0x00`` (any identifier; same relocation / FF-gap rules as ``fieldname<"">`` PCS pointers).
#   ``baseStatTotal|=hp+attack+def`` ‚Äî helper row (no ROM bytes): sums named **uint** fields; not editable.
#   **Nested struct array:** ``name<[inner fields]/countField>`` ‚Äî repeats ``inner`` N times. Usually N is read from a uint
#     field in the same struct named ``countField``. If ``countField`` is **not** a uint column here, N is resolved from
#     TOML/ROM metadata the same way as ``]count`` on the table (``[[List]]`` span, MatchedWord, PCS row count, etc.) ‚Äî
#     **pointer-backed** nested data only (4-byte GBA pointer at ``name`` or via ``*ptr``). Multiple pointer columns per
#     row are allowed (e.g. ``atks<‚Ä¶/cardnumbers> defs<‚Ä¶/cardnumbers>``).
#     The ``<[‚Ä¶]>`` block is the **layout** at ``*name`` for count-based arrays; for ``!HEX`` terminators, default is also
#     a **4-byte pointer** at ``name`` unless you use ``!HEX>inline`` (packed inline blob in the row).
#   **Parallel ``seq`` columns:** Prefix the struct with `` `seq` `` (before the opening ``[``). Every non-helper field
#     must be a pointer nested array with the **same** external ``/countRef`` (e.g. ``/cardnumbers``). ROM still has
#     ``]N`` top-level rows (usually ``]1``); ``seq`` tells the Structure tool to use **one** ROM row and **N** entries
#     where ``N`` is resolved from that count ref (same rules as ``]ref``). The Entry spinbox walks ``0..N-1``; each
#     entry shows only the slice ``field[entry]`` for every nested column so indices align across fields. Row labels
#     come from ``[[List]]`` or PCS for that ref. ``new rows`` / append-table growth is disabled for ``seq`` layouts.
#     **(A)** ``countField`` before ``name``, nested field **last** ‚Äî ``name`` is a **4-byte GBA pointer**; inner rows at ``*name``
#     (e.g. ``[cost:: ‚Ä¶ pack<[card:‚Ä¶]/cardamount>]``).
#     **(B)** nested before ``countField``, count **last** ‚Äî **implicit** pointer: 4-byte GBA word at **row** offset 0 + ``countField``
#     (e.g. ``[options<‚Ä¶/count> count::]`` ‚Üí 8 bytes if ``count::`` is 4 bytes); inner rows at ``*``(word @0).
#     Optional: append ``*ptrField`` after ``>`` to use a **named** ``ptr``/``pcs_ptr`` field instead of implicit @0 or ``name``.
#   ``flags.|t|‚Ä¶`` ‚Äî **bitfield** (``|t|``): storage size before ``|t|`` is the same rule as uints ‚Äî ``.`` = 1 byte,
#     each ``:`` = 2 bytes (so ``field:|t|`` = 2-byte container, ``field::|t|`` = 4 bytes). After ``|t|``,
#     **pipe-separated** subfields ``name`` + bit-width run where **every** ``.`` = 1 bit and **every** ``:`` = 2 bits.
#     All dots and colons between the name and the enum identifier count as width ‚Äî e.g.
#     ``race::.races`` = 5 bits (``::.`` = 2+2+1) + enum ``races``; ``color:::.bodycolors`` = 7 bits + enum.
#     Named subfields need not fill the whole storage word; the high bits are padding (preserved on edit).
#     Example: ``field.|t|x::.|y:.`` ‚Üí 5+3 bits in one byte; ``evs:|t|hp:|atk:|‚Ä¶`` ‚Üí 6√ó2 bits in 16 bits leaves 4 padding bits.
#     If you accidentally use one ``.`` before ``|t|`` but subfields need two bytes (9‚Äì16 bits), the parser promotes to 2 bytes.
#   ``field|h`` ‚Äî show this **uint** in **hex** in the Structure tool (unsigned unless ``|z`` is also used).
#   ``field|z`` ‚Äî treat ROM integer as **signed** (two‚Äôs complement) for display and inline edit.
#   ``field|b[]listOrTableName`` ‚Äî **bit array**: one bit per ``[[List]]`` row (``len(List)`` bits) or, if ``listOrTableName`` is a NamedAnchor table, ``count`` rows; storage is ``ceil(bits/8)`` bytes, LSB-first within each byte. Tools label this as a bit array and show raw bytes.
#
# Standalone NamedAnchor string tables (not ``[struct‚Ä¶]``):
#   ``[field""N]count`` ‚Äî PCS table (existing).
#   ``[field''N]count`` ‚Äî same layout, ASCII/Latin-1 slots.
#   ``''N`` ‚Äî single ASCII blob of N bytes at ``Address`` (Tools ‚Üí PCS list shows one row).
#
# **Quoting in TOML:** Tools no longer strip ``'``/``"`` from ``Format`` (that broke ``''N``).
# Prefer ``Format = "''12"`` or ``Format = '[field''8]100'``. In ``'''‚Ä¶'''`` literals, each ``''`` is one ``'``,
# so you need extra quotes to get ``''`` in the value ‚Äî or use the lenient forms ``'12`` / ``['12]1`` (collapsed).

# ‚îÄ‚îÄ Graphics NamedAnchors (FireRed Tools ‚Üí Graphics slot; decode = Python + Pillow, pret gfx.c‚Äìcompatible) ‚îÄ‚îÄ
# Whole-anchor Format (no `[`‚Ä¶`]` struct wrapper). You may wrap the value in backticks in TOML, e.g.
#   Format = '''`ucs4x8x8|graphics.items.fossils.palette1`'''
#   ucp4          ‚Äî one 32-byte chunk for hardware palette index 0 only
#   ucp4:45       ‚Äî two chunks in ROM order: first ‚Üí index 4, second ‚Üí index 5 (64 bytes); other indices = 00 00
#   ucp4:0F‚Ä¶      ‚Äî one chunk per digit; digit value = palette index 0‚ÄìF (16 digits ‚Üí 512 bytes if all indices)
#   lzp4 / lzp4:‚Ä¶ ‚Äî LZ77-compressed; same index/chunk layout after decompress
#   ucp8:N        ‚Äî uncompressed 8bpp-style palette run: N = one hex digit 0‚ÄìF, byte length = N√ó32
#   lzp8:N        ‚Äî LZ77 palette, same length rule after decompress
#                   (when used as the palette for a 4bpp sprite, only the first 32 bytes are used for decode)
#   ucs4xWxH      ‚Äî uncompressed 4bpp sprite, W√óH in 8√ó8 tiles (omit ``xH`` ‚Üí one row: ``ucs4xW`` = W√ó1)
#   ucs4xWxH|name ‚Äî palette from another NamedAnchor: if ``name`` is a **palette** anchor (or palette table), that
#                   blob is used; if it is a **struct table** (e.g. ``[index.foo.palettes]count``), the same table row
#                   as the sprite row is read and the uint ``index`` selects a row in ``foo.palettes`` (or a ``gfx_palette`` pointer).
#   uct4xWxH / uct8xWxH ‚Äî uncompressed tile sheet (same layout as ucs4/ucs8; gbagfx .4bpp / .8bpp without .lz); ``uct4xW`` = W√ó1 row
#   uct4 / uct8 / lzt4 / lzt8 ‚Äî variable-length strip: entire blob is tiles only (no dimensions); after LZ77 (if lzt*), N = bytes√∑32 or √∑64, shown as N√ó1 (like gbagfx ``-width N`` on a .4bpp/.8bpp strip). Use ``lzt4|graphics‚Ä¶palette`` etc.
#   lzt4xWxH / lzt8xWxH ‚Äî LZ77 tile sheet (gbagfx .4bpp.lz / .8bpp.lz after decompress)
#   ucs6xWxH      ‚Äî 6bpp packed tiles (48 bytes/tile): 3 bytes ‚Üí 4√ó6-bit indices per row half; decode expands to 8bpp indices 0‚Äì63 (see sprite.c / YGO-style unpack). Prefer ucp8 palette (64 colors = 128 bytes).
#   lzs6xWxH      ‚Äî LZ77-compressed 6bpp sprite (same tile layout after decompress)
#   lzs4xWxH      ‚Äî LZ77-compressed 4bpp sprite (ucs8xWxH / lzs8xWxH for 8bpp tiles)
#   ucm4xMWxMH|tileset|palette ‚Äî non-affine tilemap: MW√óMH cells √ó 2 bytes (pret NonAffineTile / Tilemap Studio GBA_4BPP); tileset = uct/lzt/ucs/lzs anchor.
#   ucm4xMWxMH / lzm4xMWxMH ‚Äî dimensions only (no ``|`` tail): for **struct** layouts, pair with separate pointer fields ‚Äî see below.
#                                 Palette: optional third ``|``; if omitted, the tileset anchor‚Äôs linked palette (e.g. ``lzt4|graphics‚Ä¶palette``) is used ‚Äî same idea as
#                                 ``gbagfx item.bin.lz tiles.4bpp.lz ‚Ä¶ -tilemap item.bin`` plus ``-palette`` from the tileset‚Äôs companion palette.
#   lzm4 / lzm8   ‚Äî same as ucm but LZ77-compressed map (gbagfx .bin.lz); 4 vs 8 selects tile bpp / tileset interpretation.
#   [rowSpec]count ‚Äî table of identical rows: rowSpec is any palette/sprite/tilemap format above; count is a PCS table name,
#                    [[List]] name (e.g. cardgraphicsindexes), or other count ref like struct formats. Tools ‚Üí Graphics
#                    shows a ‚ÄúTable row‚Äù spinbox; sprite+palette tables use the same row index for both. LZ-compressed
#                    rows in tables are not supported (uc* only).
#   ucp8:HEX+     ‚Äî one hex digit: digit√ó32 bytes (unchanged). Multiple digits (e.g. ucp8:0123): len√ó32 bytes contiguous.
# Struct field: sprite<`lzs4x2x6|graphics.items.ball.palettes`> ‚Äî pointer + tile spec + optional palette anchor name.
# Struct composite tilemap: ``tileset<`lzt4`> tilemap<`lzm4x30x24|table`> palette<`ucp4`>`` ‚Äî three pointers (4 bytes each) + specs.
#   ``tileset`` / ``tilemap`` / ``palette`` field names are preferred; otherwise exactly one ``tileset<`‚Ä¶`>`` and one ``tilemap<`‚Ä¶`>`` in the struct.
#   ``tilemap<`ucm4xWxH`>`` or ``lzm‚Ä¶`` may include an ignored ``|suffix`` (e.g. ``|table``); only ``ucm4xWxH`` / ``lzm4xWxH`` dimensions are used.
#   Tools ‚Üí Structure: select any of those fields ‚Üí **Decode preview** on **tilemap (tileset + map + optional palette)**.
