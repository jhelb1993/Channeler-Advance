# Struct uint fields: ``name:listname`` or ``name:listname+3`` / ``name:pcs.table-1`` — optional trailing signed
# integer shifts the index used for [[List]] / PCS labels (ROM stores idx; label row is idx + offset).

# ── Graphics NamedAnchors (FireRed Tools → Graphics slot; decode = Python + Pillow, pret gfx.c–compatible) ──
# Whole-anchor Format (no `[`…`]` struct wrapper). You may wrap the value in backticks in TOML, e.g.
#   Format = '''`ucs4x8x8|graphics.items.fossils.palette1`'''
#   ucp4          — one 32-byte chunk for hardware palette index 0 only
#   ucp4:45       — two chunks in ROM order: first → index 4, second → index 5 (64 bytes); other indices = 00 00
#   ucp4:0F…      — one chunk per digit; digit value = palette index 0–F (16 digits → 512 bytes if all indices)
#   lzp4 / lzp4:… — LZ77-compressed; same index/chunk layout after decompress
#   ucp8:N        — uncompressed 8bpp-style palette run: N = one hex digit 0–F, byte length = N×32
#   lzp8:N        — LZ77 palette, same length rule after decompress
#                   (when used as the palette for a 4bpp sprite, only the first 32 bytes are used for decode)
#   ucs4xWxH      — uncompressed 4bpp sprite, W×H in 8×8 tiles (omit ``xH`` → one row: ``ucs4xW`` = W×1)
#   ucs4xWxH|name — palette from another NamedAnchor: if ``name`` is a **palette** anchor (or palette table), that
#                   blob is used; if it is a **struct table** (e.g. ``[index.foo.palettes]count``), the same table row
#                   as the sprite row is read and the uint ``index`` selects a row in ``foo.palettes`` (or a ``gfx_palette`` pointer).
#   uct4xWxH / uct8xWxH — uncompressed tile sheet (same layout as ucs4/ucs8; gbagfx .4bpp / .8bpp without .lz); ``uct4xW`` = W×1 row
#   uct4 / uct8 / lzt4 / lzt8 — variable-length strip: entire blob is tiles only (no dimensions); after LZ77 (if lzt*), N = bytes÷32 or ÷64, shown as N×1 (like gbagfx ``-width N`` on a .4bpp/.8bpp strip). Use ``lzt4|graphics…palette`` etc.
#   lzt4xWxH / lzt8xWxH — LZ77 tile sheet (gbagfx .4bpp.lz / .8bpp.lz after decompress)
#   ucs6xWxH      — 6bpp packed tiles (48 bytes/tile): 3 bytes → 4×6-bit indices per row half; decode expands to 8bpp indices 0–63 (see sprite.c / YGO-style unpack). Prefer ucp8 palette (64 colors = 128 bytes).
#   lzs6xWxH      — LZ77-compressed 6bpp sprite (same tile layout after decompress)
#   lzs4xWxH      — LZ77-compressed 4bpp sprite (ucs8xWxH / lzs8xWxH for 8bpp tiles)
#   ucm4xMWxMH|tileset|palette — non-affine tilemap: MW×MH cells × 2 bytes (pret NonAffineTile / Tilemap Studio GBA_4BPP); tileset = uct/lzt/ucs/lzs anchor.
#   ucm4xMWxMH / lzm4xMWxMH — dimensions only (no ``|`` tail): for **struct** layouts, pair with separate pointer fields — see below.
#                                 Palette: optional third ``|``; if omitted, the tileset anchor’s linked palette (e.g. ``lzt4|graphics…palette``) is used — same idea as
#                                 ``gbagfx item.bin.lz tiles.4bpp.lz … -tilemap item.bin`` plus ``-palette`` from the tileset’s companion palette.
#   lzm4 / lzm8   — same as ucm but LZ77-compressed map (gbagfx .bin.lz); 4 vs 8 selects tile bpp / tileset interpretation.
#   [rowSpec]count — table of identical rows: rowSpec is any palette/sprite/tilemap format above; count is a PCS table name,
#                    [[List]] name (e.g. cardgraphicsindexes), or other count ref like struct formats. Tools → Graphics
#                    shows a “Table row” spinbox; sprite+palette tables use the same row index for both. LZ-compressed
#                    rows in tables are not supported (uc* only).
#   ucp8:HEX+     — one hex digit: digit×32 bytes (unchanged). Multiple digits (e.g. ucp8:0123): len×32 bytes contiguous.
# Struct field: sprite<`lzs4x2x6|graphics.items.ball.palettes`> — pointer + tile spec + optional palette anchor name.
# Struct composite tilemap: ``tileset<`lzt4`> tilemap<`lzm4x30x24|table`> palette<`ucp4`>`` — three pointers (4 bytes each) + specs.
#   ``tileset`` / ``tilemap`` / ``palette`` field names are preferred; otherwise exactly one ``tileset<`…`>`` and one ``tilemap<`…`>`` in the struct.
#   ``tilemap<`ucm4xWxH`>`` or ``lzm…`` may include an ignored ``|suffix`` (e.g. ``|table``); only ``ucm4xWxH`` / ``lzm4xWxH`` dimensions are used.
#   Tools → Structure: select any of those fields → **Decode preview** on **tilemap (tileset + map + optional palette)**.
